<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENUEL AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Nama KENUEL AI dengan class brand-title agar bisa diberi animasi bergerak di CSS -->
        <h1 class="brand-title">🤖 KENUEL AI</h1>
        <p>Developer: WhoIsToken</p>

        <!-- Tempat riwayat chat kamu muncul -->
        <div id="chat"></div>

        <!-- Kolom input chat baru dengan tombol upload foto/video -->
        <div class="input-area">
            <label for="file-input" class="upload-btn">📁 Kirim Media</label>
            <input type="file" id="file-input" accept="image/*,video/*" style="display:none;">
            
            <input type="text" id="input" placeholder="Tulis pesan atau perintah AI...">
            <button onclick="prosesPerintahAI()">Kirim</button>
        </div>

        <!-- Menu tombol fitur AI baru -->
        <div class="menu">
            <button onclick="setFitur('hd')">✨ Jernihkan (HD)</button>
            <button onclick="setFitur('logo')">🎨 Buat Logo</button>
            <button onclick="setFitur('stiker')">🎭 Buat Stiker</button>
            <button onclick="alert('Fitur lainnya segera hadir')">⚙️ Pengaturan</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
